<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Ideias com IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell" aria-label="Gerador de Ideias com IA">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Gerador de Ideias com IA">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Ideias IA</span>
      </a>
      <span class="model-pill">OpenAI API</span>
    </header>

    <section class="chat" aria-live="polite">
      <div class="welcome" id="welcome">
        <span class="welcome-mark" aria-hidden="true"></span>
        <h1>Que ideia queres explorar?</h1>
        <p>Escreve um tema, produto, desafio ou area de interesse. Eu devolvo cinco direcoes criativas e podes abrir qualquer uma para a aprofundar.</p>
      </div>

      <div id="conversation" class="conversation">
        <div id="results" class="results"></div>
        <div id="ideaDetail" class="detail hidden"></div>
      </div>
    </section>

    <form id="ideaForm" class="composer">
      <label class="sr-only" for="topic">Tema</label>
      <textarea id="topic" name="topic" placeholder="Pergunta por ideias para..." required></textarea>
      <button id="generateButton" class="send-button" type="submit" aria-label="Gerar ideias">
        <span id="buttonText">Gerar</span>
        <span id="buttonSpinner" class="spinner hidden" aria-hidden="true"></span>
      </button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
